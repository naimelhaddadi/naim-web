<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naim El Haddadi — Ingeniería de Eficiencia Operativa</title>
<meta name="description" content="Automatizo procesos complejos con Agentes de IA y desarrollo a medida. Recupera 20 horas semanales y duplica tu pipeline de ventas.">
<meta name="author" content="Naim El Haddadi">
<link rel="canonical" href="https://naimelhaddadi.com/">
<meta property="og:title" content="Naim El Haddadi — Ingeniería de Eficiencia Operativa">
<meta property="og:description" content="Automatizo procesos complejos con Agentes de IA y desarrollo a medida.">
<meta property="og:url" content="https://naimelhaddadi.com/">
<meta property="og:type" content="website">
<meta property="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="shortcut icon" href="/assets/letra-n.png" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --white:#ffffff; --stone:#f7f6f3; --stone-2:#efeee9; --stone-3:#e0dfd8;
  --ink:#12110f; --ink-2:#44423d; --ink-3:#908d86; --ink-4:#bfbdb8;
  --blue:#1d4ed8; --blue-2:#2563eb; --blue-3:#3b82f6;
  --blue-bg:#eff6ff; --blue-bd:#bfdbfe;
  --green:#059669; --amber:#d97706;
  --f-display:'Fraunces',serif; --f-body:'DM Sans',sans-serif; --f-mono:'JetBrains Mono',monospace;
  --max:1120px; --r-sm:6px; --r-md:10px; --r-lg:16px; --r-xl:24px;
  --sh-sm:0 1px 3px rgba(18,17,15,.07),0 1px 5px rgba(18,17,15,.04);
  --sh-md:0 2px 10px rgba(18,17,15,.08),0 4px 24px rgba(18,17,15,.05);
  --sh-lg:0 8px 36px rgba(18,17,15,.1),0 2px 8px rgba(18,17,15,.06);
}

/* DARK MODE OVERRIDES */
[data-theme="dark"] {
  --white:#0f0f0f; --stone:#171717; --stone-2:#212121; --stone-3:#303030;
  --ink:#fafafa; --ink-2:#d4d4d4; --ink-3:#a3a3a3; --ink-4:#737373;
  --blue-bg:#1e3a8a25; --blue-bd:#1e3a8a80;
  --sh-sm:0 1px 3px rgba(0,0,0,.4); --sh-md:0 4px 12px rgba(0,0,0,.5); --sh-lg:0 8px 36px rgba(0,0,0,.6);
  
  /* Chat dark mode adjustments */
  color{color: #1d4ed8;}
  .chat-card{background:linear-gradient(135deg, var(--stone) 0%, #1a1a1a 100%);border-color:var(--stone-3)}
  .chat-msgs{background:linear-gradient(180deg, rgba(255,255,255,.01) 0%, rgba(0,0,0,.03) 100%)}
  .msg.b .bbl{background:linear-gradient(135deg, var(--stone-2) 0%, var(--stone) 100%);border-color:var(--stone-3);color:var(--ink)}
  .chat-opts{background:linear-gradient(135deg, rgba(23,23,23,.95) 0%, rgba(33,33,33,.95) 100%);border-color:rgba(255,255,255,.06)}
  .co{background:linear-gradient(135deg, rgba(23,23,23,.8) 0%, rgba(33,33,33,.8) 100%);border-color:rgba(255,255,255,.1);color:var(--ink-2)}
  .co:hover{background:linear-gradient(135deg, var(--blue-bg) 0%, rgba(30,58,138,.2) 100%);border-color:var(--blue-bd)}
  .chat-in-r{background:linear-gradient(135deg, rgba(23,23,23,.95) 0%, rgba(33,33,33,.95) 100%);border-color:rgba(255,255,255,.06)}
  .ci{background:linear-gradient(135deg, rgba(23,23,23,.9) 0%, rgba(33,33,33,.9) 100%);border-color:rgba(255,255,255,.1);color:var(--ink)}
  .ci:focus{background:linear-gradient(135deg, var(--stone-2) 0%, var(--stone) 100%);border-color:var(--blue-bd)}
  .ty-b{background:linear-gradient(135deg, var(--stone-2) 0%, var(--stone) 100%);border-color:var(--stone-3)}
  .chat-mdl{background:linear-gradient(135deg, var(--stone-2) 0%, var(--stone-3) 100%);border-color:rgba(255,255,255,.06)}
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{background:var(--white);color:var(--ink);font-family:var(--f-body);font-size:16px;line-height:1.65;overflow-x:hidden;transition:background 0.3s, color 0.3s;}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--f-body);border:none;background:none}
::selection{background:var(--blue);color:#fff}

.w{max-width:var(--max);margin:0 auto;padding:0 28px}
.section{padding:88px 0}
hr.rule{border:none;height:1px;background:var(--stone-3);margin:0}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:color-mix(in srgb, var(--white) 90%, transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--stone-3);height:60px}
.nav-i{max-width:var(--max);margin:0 auto;padding:0 28px;height:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--f-display);font-size:18px;font-weight:700;letter-spacing:-.01em}
.nav-logo em{font-style:normal;color:var(--blue)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:14px;color:var(--ink-2);transition:color .15s}
.nav-links a:hover{color:var(--blue)}
.nav-actions{display:flex;align-items:center;gap:12px;}
.nav-btn{background:var(--blue);color:#fff;padding:8px 18px;border-radius:var(--r-md);font-size:14px;font-weight:500;transition:all .15s;box-shadow:0 1px 4px rgba(29,78,216,.3)}
.nav-btn:hover{background:var(--blue-2);transform:translateY(-1px)}
.theme-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--stone-3);display:flex;align-items:center;justify-content:center;color:var(--ink-2);transition:all 0.2s;}
.theme-btn:hover{background:var(--stone);color:var(--blue);border-color:var(--blue);}
@media(max-width:768px){.nav-links{display:none}}

/* HERO */
#hero{padding:120px 0 80px;background:linear-gradient(160deg,var(--white) 55%,var(--stone) 100%);position:relative;overflow:hidden}
#hero::after{content:'';position:absolute;top:-100px;right:-80px;width:460px;height:460px;background:radial-gradient(circle,rgba(59,130,246,.07) 0%,transparent 65%);pointer-events:none;border-radius:50%}
#hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
#hero::before{
  background:
    radial-gradient(circle at 20% 30%, rgba(59,130,246,.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(139,92,246,.02) 0%, transparent 50%),
    radial-gradient(circle at 60% 10%, rgba(16,185,129,.02) 0%, transparent 50%);
  animation:float 20s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-10px)}}
.hero-grid{display:grid;grid-template-columns:1fr 1.6fr;gap:56px;align-items:start}
@media(max-width:960px){.hero-grid{grid-template-columns:1fr}}

.hero-avatar { width: 350px; height: 350px; border-radius: 50%; object-fit: cover; object-position: top; border: 3px solid var(--white); box-shadow: var(--sh-md); margin-bottom: 0; background: var(--stone); display: block; }

.hero-portrait-container { position: relative; display: flex; justify-content: center; align-items: center; }

.badge { position: absolute; background: var(--white); border: 1px solid var(--stone-3); border-radius: var(--r-md); padding: 4px 8px; font-size: 11px; font-family: var(--f-mono); box-shadow: var(--sh-sm); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; animation: badgeFloat 6s ease-in-out infinite; }

.badge:hover { background: var(--blue-bg); border-color: var(--blue-bd); transform: scale(1.05) translateY(-2px); box-shadow: 0 8px 25px rgba(29,78,216,.15); }

@keyframes badgeFloat {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-3px); }
}

@keyframes numberPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.02); }
}

@keyframes serviceGrow {
  0%, 100% { transform: scale(1); box-shadow: 0 4px 6px rgba(0,0,0,.05); }
  50% { transform: scale(1.01); box-shadow: 0 8px 15px rgba(0,0,0,.08); }
}

@keyframes chatActive {
  0%, 100% { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  50% { box-shadow: 0 8px 24px rgba(29,78,216,.12); }
}

@keyframes dataFlow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.b-1 { top: 10px; right: 10px; }

.b-2 { bottom: 10px; left: 10px; }

.b-n { font-weight: 500; color: var(--blue); }

.b-l { font-size: 10px; color: var(--ink-3); margin-top: 2px; }

.hero-right { display: flex; flex-direction: column; gap: 32px; align-items: center; }

.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--blue-bg);border:1px solid var(--blue-bd);padding:5px 13px;border-radius:40px;font-size:12px;font-weight:500;color:var(--blue-2);font-family:var(--f-mono);letter-spacing:.03em;margin-bottom:22px}
.hero-badge::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--blue);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

h1.hero-name{font-family:var(--f-display);font-size:clamp(38px,5vw,64px);font-weight:700;line-height:1.0;letter-spacing:-.025em;margin-bottom:8px}
.hero-role{font-family:var(--f-display);font-size:clamp(18px,2.2vw,26px);font-weight:300;font-style:italic;color:var(--blue);margin-bottom:20px}
.hero-sub{font-size:17px;font-weight:300;color:var(--ink-2);line-height:1.75;max-width:520px;margin-bottom:34px}
.hero-sub strong{color:var(--ink);font-weight:500}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-p{background:var(--blue);color:#fff;padding:13px 26px;border-radius:var(--r-md);font-weight:500;font-size:15px;transition:all .18s;box-shadow:0 2px 8px rgba(29,78,216,.25)}
.btn-p:hover{background:var(--blue-2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(29,78,216,.3)}
.btn-o{background:transparent;color:var(--ink-2);padding:13px 26px;border-radius:var(--r-md);font-size:15px;border:1px solid var(--stone-3);transition:all .18s}
.btn-o:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.hero-stats{display:flex;gap:36px;margin-top:44px;padding-top:36px;border-top:1px solid var(--stone-3);flex-wrap:wrap}
.stat-n{font-family:var(--f-display);font-size:30px;font-weight:700;color:var(--blue);letter-spacing:-.02em;line-height:1;animation:countUp 2s ease-out forwards;opacity:0}
.stat-n[data-target]{animation:countUp 2s ease-out forwards}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stat-l{font-size:13px;color:var(--ink-3);margin-top:3px}

/* Hero card */
.hero-card{background:var(--white);border:1px solid var(--stone-3);border-radius:var(--r-xl);padding:32px;box-shadow:var(--sh-lg);position:relative}
.hero-card-lbl{position:absolute;top:-13px;left:26px;background:var(--white);border:1px solid var(--stone-3);border-radius:40px;padding:4px 14px;font-size:11px;font-family:var(--f-mono);color:var(--ink-3);box-shadow:var(--sh-sm)}
.p-step{display:flex;gap:14px;align-items:flex-start}
.p-num{width:30px;height:30px;flex-shrink:0;background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:12px;font-weight:500;color:var(--blue)}
.p-label{font-size:14px;font-weight:500}
.p-desc{font-size:13px;color:var(--ink-3);margin-top:1px}
.p-line{width:1px;height:14px;background:var(--stone-3);margin:0 14px 0 14px}
.stack-row{margin-top:24px;padding-top:18px;border-top:1px solid var(--stone-3)}
.stack-lbl{font-size:12px;color:var(--ink-3);font-family:var(--f-mono);margin-bottom:8px}
.tags-row{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;font-family:var(--f-mono);background:var(--stone);border:1px solid var(--stone-3);padding:3px 9px;border-radius:20px;color:var(--ink-3)}
.tag.b{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-2)}

/* TICKER */
.ticker{border-top:1px solid var(--stone-3);border-bottom:1px solid var(--stone-3);padding:14px 0;overflow:hidden;background:linear-gradient(90deg,var(--stone) 0%,#f3f4f6 50%,var(--stone) 100%);position:relative}
.ticker::before{content:'';position:absolute;top:0;left:0;bottom:0;width:80px;background:linear-gradient(90deg,var(--stone) 0%,transparent 100%);z-index:1;pointer-events:none}
.ticker::after{content:'';position:absolute;top:0;right:0;bottom:0;width:80px;background:linear-gradient(270deg,var(--stone) 0%,transparent 100%);z-index:1;pointer-events:none}
.ticker-i{display:flex;gap:0;animation:tick 25s linear infinite;width:max-content}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tk{font-family:var(--f-mono);font-size:12px;color:var(--ink-4);white-space:nowrap;padding:0 26px;border-right:1px solid var(--stone-3);display:flex;align-items:center;gap:8px;position:relative}
.tk::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue-3);flex-shrink:0;animation:blink 1.5s ease infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0.3}}
.tk.hi{color:var(--ink-3);font-weight:500}
.tk.hi::before{background:#10b981}

/* SECTION HEADER */
.eyebrow{font-family:var(--f-mono);font-size:11px;font-weight:500;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.eyebrow::before{content:'';width:18px;height:1px;background:var(--blue);flex-shrink:0}
.h2-d{font-family:var(--f-display);font-size:clamp(32px,4.2vw,52px);font-weight:700;line-height:1.05;letter-spacing:-.025em}
.s-lead{font-size:16px;font-weight:300;color:var(--ink-2);max-width:500px;margin-top:12px;line-height:1.75}

/* PAIN */
#pain{background:var(--white)}
.pain-accordion{display:flex;flex-direction:column;gap:12px;margin-top:44px}
.pain-item{border:1px solid var(--stone-3);border-radius:var(--r-lg);overflow:hidden;background:var(--stone);transition:all .5s cubic-bezier(0.34, 1.56, 0.64, 1);box-shadow:0 2px 4px rgba(0,0,0,.02)}
.pain-item.open{background:var(--white);border-color:var(--blue);box-shadow:0 8px 24px rgba(29,78,216,.15)}
.pain-header{padding:18px 22px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .4s cubic-bezier(0.34, 1.56, 0.64, 1);user-select:none}
.pain-header:hover{background:linear-gradient(135deg, var(--stone) 0%, #fafaf8 100%)}
.pain-item.open .pain-header{background:linear-gradient(135deg, var(--blue-bg) 0%, #eff6ff 100%)}
.pain-icon{font-size:20px;flex-shrink:0;transition:transform .6s cubic-bezier(0.34, 1.56, 0.64, 1)}
.pain-item.open .pain-icon{transform:scale(1.15) rotate(10deg)}
.pain-header-text{flex:1}
.pain-t{font-size:14px;font-weight:700;color:var(--ink);transition:all .4s ease}
.pain-item.open .pain-t{color:var(--blue);transform:translateX(2px)}
.pain-toggle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--blue);font-weight:700;flex-shrink:0;transition:transform .6s cubic-bezier(0.34, 1.56, 0.64, 1)}
.pain-item.open .pain-toggle{transform:rotate(180deg) scale(1.1)}
.pain-content{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(0.34, 1.56, 0.64, 1),padding .5s ease,opacity .4s ease;padding:0 22px;opacity:0}
.pain-item.open .pain-content{max-height:300px;padding:18px 22px;border-top:1px solid var(--blue-bd);opacity:1;animation:slideDown .5s cubic-bezier(0.34, 1.56, 0.64, 1)}
@keyframes slideDown{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
.pain-d{font-size:13px;color:var(--ink-2);line-height:1.65}

/* ROI */
#roi{background:var(--white)}
.roi-wrap{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
@media(max-width:860px){.roi-wrap{grid-template-columns:1fr}}
.roi-card{background:var(--white);border:1px solid var(--stone-3);border-radius:var(--r-xl);padding:34px;box-shadow:var(--sh-md)}
.sl-lbl{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--ink-2);margin-bottom:8px}
.sl-val{font-family:var(--f-mono);font-size:12px;font-weight:500;color:var(--blue);background:var(--blue-bg);padding:2px 9px;border-radius:var(--r-sm)}
.sg{margin-bottom:24px}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:4px;background:var(--stone-3);border-radius:2px;outline:none;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--blue);cursor:pointer;border:3px solid var(--white);box-shadow:0 0 0 2px var(--blue),0 2px 6px rgba(29,78,216,.3);transition:transform .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
.roi-bkdn{margin-top:20px;border-top:1px solid var(--stone-3);padding-top:16px;display:flex;flex-direction:column;gap:9px}
.br{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.br-k{color:var(--ink-3)}
.br-v{font-weight:500;font-family:var(--f-mono);font-size:12px}
.br-v.pos{color:var(--green)}

.roi-res{background:linear-gradient(135deg,#0a0f1c 0%,#1e2535 100%);border-radius:var(--r-xl);padding:38px;color:#fff;position:relative;overflow:hidden}
.roi-res::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(59,130,246,.2) 0%,transparent 70%)}
.roi-res-lbl{font-family:var(--f-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px}
.roi-res-n{font-family:var(--f-display);font-size:clamp(56px,8vw,88px);font-weight:700;line-height:1;letter-spacing:-.03em;color:#fff;margin-bottom:4px;transition:all .3s}
.roi-res-sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:24px}
.roi-note{background:rgba(255,255,255,.07);border-radius:var(--r-md);padding:13px 15px;font-size:13px;color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:22px}
.roi-cta{display:block;text-align:center;background:var(--blue);color:#fff;padding:13px;border-radius:var(--r-md);font-weight:500;font-size:14px;transition:all .18s;box-shadow:0 2px 10px rgba(29,78,216,.4)}
.roi-cta:hover{background:var(--blue-2);transform:translateY(-1px)}

/* SERVICES */
#services{background:var(--stone)}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px}
@media(max-width:768px){.svc-grid{grid-template-columns:1fr}}
.svc{background:var(--white);border:1px solid var(--stone-3);border-radius:var(--r-lg);padding:26px;transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);position:relative;overflow:hidden;animation:serviceGrow 8s ease-in-out infinite}
.svc::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg, rgba(59,130,246,.05) 0%, transparent 50%);opacity:0;transition:opacity .3s ease;pointer-events:none}
.svc:hover{box-shadow:0 25px 50px rgba(0,0,0,.15);transform:translateY(-6px) rotate(1deg);border-color:var(--blue-bd)}
.svc:hover::before{opacity:1}
.svc:hover .svc-icon{transform:scale(1.1) rotate(-5deg);background:linear-gradient(135deg, var(--blue) 0%, var(--blue-2) 100%);color:#fff}
.svc-num{font-family:var(--f-mono);font-size:11px;color:var(--ink-4);margin-bottom:16px}
.svc-icon{width:42px;height:42px;border-radius:var(--r-md);background:var(--blue-bg);border:1px solid var(--blue-bd);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px;transition:all .3s ease}
.svc-t{font-size:16px;font-weight:600;margin-bottom:8px;letter-spacing:-.01em;transition:color .3s ease}
.svc:hover .svc-t{color:var(--blue)}
.svc-d{font-size:14px;color:var(--ink-2);line-height:1.7;margin-bottom:14px}

/* CASES */
#cases{background:var(--white)}
.cases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px}
@media(max-width:768px){.cases-grid{grid-template-columns:1fr}}
.cc{background:var(--white);border:1px solid var(--stone-3);border-radius:var(--r-lg);padding:24px;display:flex;flex-direction:column;transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);transform:translateY(30px);opacity:0}
.cc:hover{box-shadow:0 20px 40px rgba(0,0,0,.1);border-color:var(--blue)}
.cc.animate-in{animation:slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards}
@keyframes slideUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
.cc-tag{font-size:11px;font-family:var(--f-mono);background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue-2);padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:16px}
.cc-n{font-family:var(--f-display);font-size:clamp(42px,5vw,58px);font-weight:700;color:var(--blue);line-height:1;letter-spacing:-.03em;margin-bottom:4px;transition:color .3s ease;position:relative}
.cc-n::after{content:'';position:absolute;-top:2px;-right:2px;width:8px;height:8px;border-radius:50%;background:#10b981;opacity:0.7}
.cc:hover .cc-n{color:#1d4ed8}
.cc:hover .cc-n::after{animation:pulse 1.5s ease infinite}
.cc-m{font-size:11px;font-family:var(--f-mono);color:var(--ink-4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.cc-d{font-size:13px;color:var(--ink-2);line-height:1.65;flex:1}
.cc-f{margin-top:12px;padding-top:10px;border-top:1px solid var(--stone-3);font-size:11px;font-family:var(--f-mono);color:var(--ink-4)}

/* PROCESS */
#process{background:var(--stone)}
.proc-accordion{display:flex;flex-direction:column;gap:12px;margin-top:44px}
.proc-item-acc{border:1px solid var(--stone-3);border-radius:var(--r-lg);overflow:hidden;background:var(--stone);transition:all .5s cubic-bezier(0.34, 1.56, 0.64, 1);box-shadow:0 2px 4px rgba(0,0,0,.02)}
.proc-item-acc.open{background:var(--white);border-color:var(--blue);box-shadow:0 8px 24px rgba(29,78,216,.15)}
.proc-header{padding:18px 22px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .4s cubic-bezier(0.34, 1.56, 0.64, 1);user-select:none}
.proc-header:hover{background:linear-gradient(135deg, var(--stone) 0%, #fafaf8 100%)}
.proc-item-acc.open .proc-header{background:linear-gradient(135deg, var(--blue-bg) 0%, #eff6ff 100%)}
.proc-num-badge{background:var(--blue);color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;transition:all .6s cubic-bezier(0.34, 1.56, 0.64, 1)}
.proc-item-acc.open .proc-num-badge{transform:scale(1.2) rotate(360deg);background:linear-gradient(135deg, var(--blue) 0%, var(--blue-2) 100%)}
.proc-header-text{flex:1}
.proc-title{font-size:16px;font-weight:700;color:var(--ink);transition:all .4s ease}
.proc-item-acc.open .proc-title{color:var(--blue);transform:translateX(2px)}
.proc-badge-acc{font-size:11px;font-family:var(--f-mono);color:var(--blue);background:var(--blue-bg);padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:6px;transition:all .4s ease}
.proc-item-acc.open .proc-badge-acc{background:var(--blue);color:#fff;transform:scale(1.05)}
.proc-toggle{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--blue);font-weight:700;flex-shrink:0;transition:transform .6s cubic-bezier(0.34, 1.56, 0.64, 1)}
.proc-item-acc.open .proc-toggle{transform:rotate(180deg) scale(1.1)}
.proc-content-item{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(0.34, 1.56, 0.64, 1),padding .5s ease,opacity .4s ease;padding:0 22px;opacity:0}
.proc-item-acc.open .proc-content-item{max-height:400px;padding:18px 22px;border-top:1px solid var(--blue-bd);opacity:1;animation:slideDown .5s cubic-bezier(0.34, 1.56, 0.64, 1)}
.proc-desc{font-size:14px;color:var(--ink-2);line-height:1.65;margin-bottom:12px}
.proc-items{display:flex;flex-direction:column;gap:8px}
.proc-item{font-size:12px;color:var(--ink-3);display:flex;gap:7px;align-items:flex-start}
.proc-item::before{content:'→';color:var(--blue);flex-shrink:0;font-weight:500}

/* AI PLAYGROUND */
#playground{background:var(--white);position:relative;overflow:hidden}
.pg-grid{display:grid;grid-template-columns:1fr 470px;gap:48px;align-items:start}
@media(max-width:960px){.pg-grid{grid-template-columns:1fr}}
.pg-info{position:static;animation:fadeInUp 0.6s ease-out 0.1s both}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.pg-badge-live{display:inline-flex;align-items:center;gap:6px;background:var(--green);border:1px solid #10b98130;padding:5px 12px;border-radius:20px;font-family:var(--f-mono);font-size:11px;color:#fff;margin-bottom:16px;box-shadow:0 2px 8px rgba(16,185,129,.15)}
.pg-badge-live::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse 2s ease infinite}
.pg-h2{font-family:var(--f-display);font-size:clamp(28px,3.2vw,44px);font-weight:700;letter-spacing:-.025em;margin-bottom:12px;line-height:1.1;color:var(--ink)}
.pg-desc{font-size:15px;color:var(--ink-2);line-height:1.7;margin-bottom:20px;max-width:560px}
.code-box{background:#0c1120;border:1px solid #1e2d4a;border-radius:12px;padding:20px;font-family:var(--f-mono);font-size:12px;color:#94a3b8;line-height:1.6;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.03)}
.code-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.4),transparent)}
.kw{color:#60a5fa}.str{color:#34d399}.fn{color:#fbbf24}.cm{color:#64748b;font-style:italic}
.pg-pills{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pg-pill{background:var(--white);border:1px solid var(--stone-3);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--ink-2);display:flex;align-items:center;gap:6px;transition:all .2s ease;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.pg-pill:hover{background:var(--stone);border-color:var(--blue);color:var(--blue);transform:translateY(-1px);box-shadow:0 4px 12px rgba(29,78,216,.1)}
.pg-pill:nth-child(1)::before{content:'⚡'}
.pg-pill:nth-child(2)::before{content:'🌊'}
.pg-pill:nth-child(3)::before{content:'🧠'}
.pg-pill:nth-child(4)::before{content:'💾'}

.chat-card{background:var(--white);border:1px solid var(--stone-3);border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08);animation:fadeInUp 0.6s ease-out 0.4s both, chatActive 5s ease-in-out infinite}
.chat-hd{background:linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);padding:18px 20px;display:flex;align-items:center;gap:14px}
.chat-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:2px solid rgba(255,255,255,.8);box-shadow:0 2px 4px rgba(0,0,0,.1)}
.chat-nm{font-weight:700;font-size:16px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.chat-st{font-size:12px;color:rgba(255,255,255,.9);display:flex;align-items:center;gap:6px;font-family:var(--f-mono);font-weight:500}
.chat-st::before{content:'';width:8px;height:8px;border-radius:50%;background:#4ade80;border:2px solid rgba(255,255,255,.3);animation:pulse 2s ease infinite}
.chat-msgs{height:320px;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;background:#fafbfc;scrollbar-width:thin;scrollbar-color:var(--stone-3) transparent}
.chat-msgs::-webkit-scrollbar{width:4px}
.chat-msgs::-webkit-scrollbar-track{background:transparent}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--stone-3);border-radius:2px}
.msg{display:flex;gap:12px;animation:slideIn .3s ease-out;opacity:0;animation-fill-mode:forwards}
.msg.u{flex-direction:row-reverse}
.msg:nth-child(1){animation-delay:.1s}
.msg:nth-child(2){animation-delay:.2s}
.msg:nth-child(3){animation-delay:.3s}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bbl{max-width:75%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5;position:relative}
.msg.b .bbl{background:var(--white);color:var(--ink);border:1px solid var(--stone-3);border-bottom-left-radius:4px;box-shadow:0 2px 4px rgba(0,0,0,.05)}
.msg.u .bbl{background:var(--blue);color:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(29,78,216,.2)}
.m-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;align-self:flex-end;border:1px solid rgba(255,255,255,.8);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.m-av.bot{background:linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);border-color:rgba(255,255,255,.6)}
.m-av.usr{background:var(--stone-2);color:var(--ink-2);border-color:var(--stone-3)}
.ty-b{background:var(--white);border:1px solid var(--stone-3);border-radius:16px;border-bottom-left-radius:4px;padding:12px 16px;display:flex;gap:4px;align-items:center}
.ty-b span{width:4px;height:4px;border-radius:50%;background:var(--blue);animation:typing 1.4s ease infinite}
.ty-b span:nth-child(2){animation-delay:.2s}
.ty-b span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:scale(1);opacity:1}30%{transform:scale(1.2);opacity:.7}}
.chat-opts{padding:14px 20px;background:#f8fafc;border-top:1px solid var(--stone-3);display:flex;flex-wrap:wrap;gap:6px}
.co{font-size:12px;padding:6px 12px;border:1px solid var(--stone-3);border-radius:20px;color:var(--ink-2);background:var(--white);transition:all .15s ease;cursor:pointer;font-family:var(--f-body);font-weight:500}
.co:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);transform:translateY(-1px)}
.chat-in-r{padding:16px 20px;background:#f8fafc;border-top:1px solid var(--stone-3);display:flex;gap:10px;align-items:center}
.ci{flex:1;background:var(--white);border:1px solid var(--stone-3);color:var(--ink);padding:10px 14px;border-radius:20px;font-size:14px;font-family:var(--f-body);outline:none;transition:all .15s ease}
.ci:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(29,78,216,.1)}
.ci::placeholder{color:var(--ink-4)}
.cs{background:var(--blue);color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .15s ease;cursor:pointer;border:none;box-shadow:0 2px 6px rgba(29,78,216,.2)}
.cs:hover{background:var(--blue-2);transform:scale(1.05);box-shadow:0 4px 12px rgba(29,78,216,.3)}
.cs:disabled{opacity:.6;cursor:not-allowed;transform:none}
.chat-mdl{padding:10px 20px;background:var(--stone);border-top:1px solid var(--stone-3);font-size:10px;font-family:var(--f-mono);color:var(--ink-4);display:flex;align-items:center;gap:4px}

/* CONTACT */
#contact{background:var(--stone)}
.ct-wrap{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start}
@media(max-width:900px){.ct-wrap{grid-template-columns:1fr}}
.ct-hl{margin:22px 0;padding:16px 18px;background:var(--blue-bg);border:1px solid var(--blue-bd);border-radius:var(--r-md);border-left:3px solid var(--blue);font-size:14px;color:var(--ink-2);line-height:1.7}
.ct-hl strong{color:var(--ink)}
.c-links{display:flex;flex-direction:column;gap:9px;margin-top:22px}
.cl{display:flex;align-items:center;gap:11px;padding:12px 15px;background:var(--white);border:1px solid var(--stone-3);border-radius:var(--r-md);font-size:14px;color:var(--ink-2);transition:all .15s}
.cl:hover{border-color:var(--blue);color:var(--blue)}
.cl-ico{width:30px;height:30px;border-radius:var(--r-sm);background:var(--stone);border:1px solid var(--stone-3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.cl-ico svg{width:18px;height:18px;display:block;fill:currentColor}
.cl-ico.whatsapp{color:#25D366}
.cl-ico.email{color:#D14836}
.ftl.social-whatsapp svg{width:14px;height:14px;display:block;fill:currentColor;color:#25D366}
.ftl.social-email svg{width:14px;height:14px;display:block;fill:currentColor;color:#D14836}
.ftl.social-github svg{width:14px;height:14px;display:block;fill:currentColor;color:#fff}
.ftl.social-linkedin svg{width:14px;height:14px;display:block;fill:currentColor;color:#0A66C2}
.fc-card{background:var(--white);border:1px solid var(--stone-3);border-radius:var(--r-xl);padding:34px;box-shadow:var(--sh-md)}
.fg{margin-bottom:14px;display:flex;flex-direction:column;gap:5px}
.fg label{font-size:13px;font-weight:500;color:var(--ink-2)}
.fc{background:var(--stone);border:1px solid var(--stone-3);color:var(--ink);padding:10px 13px;border-radius:var(--r-md);font-size:14px;font-family:var(--f-body);outline:none;width:100%;transition:all .15s}
.fc:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.fc::placeholder{color:var(--ink-4)}
textarea.fc{resize:vertical;min-height:86px}
select.fc option{background:var(--white)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:600px){.f2{grid-template-columns:1fr}}
.f-btn{width:100%;background:var(--blue);color:#fff;padding:13px;border-radius:var(--r-md);font-weight:500;font-size:15px;font-family:var(--f-body);cursor:pointer;border:none;transition:all .18s;box-shadow:0 2px 8px rgba(29,78,216,.25);margin-top:4px}
.f-btn:hover{background:var(--blue-2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(29,78,216,.3)}
.f-note{text-align:center;font-size:12px;color:var(--ink-4);margin-top:9px;font-family:var(--f-mono)}

/* FOOTER */
footer{background:#0a0a0a;color:#fff;padding:44px 0 32px}
.ft-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:32px;padding-bottom:28px;border-bottom:1px solid rgba(255,255,255,.1)}
.ft-logo{font-family:var(--f-display);font-size:21px;font-weight:700;letter-spacing:-.02em;margin-bottom:5px}
.ft-logo span{color:var(--blue-3)}
.ft-domain{font-family:var(--f-mono);font-size:14px;font-weight:500;color:var(--blue-3);margin-bottom:8px;letter-spacing:.01em}
.ft-tagline{font-size:13px;color:rgba(255,255,255,.4);max-width:300px;line-height:1.6}
.ft-links{display:flex;gap:12px;flex-wrap:wrap}
.ftl{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,.45);padding:7px 13px;border:1px solid rgba(255,255,255,.1);border-radius:var(--r-md);transition:all .15s}
.ftl:hover{color:#fff;border-color:rgba(255,255,255,.3)}
.ft-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:20px;flex-wrap:wrap;gap:10px}
.ft-copy{font-size:12px;color:rgba(255,255,255,.28);font-family:var(--f-mono)}
.ft-stack{font-size:12px;color:rgba(255,255,255,.2);font-family:var(--f-mono)}

/* REVEAL */
.rv{opacity:1;transform:none}
.rv.rv-hidden{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}
.rv.in{opacity:1;transform:none}
.rv.rv-hidden[data-d="1"]{transition-delay:.1s}
.rv.rv-hidden[data-d="2"]{transition-delay:.2s}

/* =====================================================
   DESIGN ENHANCEMENT LAYER
   ===================================================== */

/* Avatar gradient ring */
.hero-portrait-container::before{content:'';position:absolute;width:364px;height:364px;border-radius:50%;background:linear-gradient(135deg,#3b82f6 0%,#8b5cf6 40%,#ec4899 70%,#3b82f6 100%);background-size:300% 300%;animation:avatarRing 4s ease-in-out infinite;z-index:0}
@keyframes avatarRing{0%,100%{background-position:0% 50%;opacity:.7}50%{background-position:100% 50%;opacity:1}}
.hero-avatar{border:5px solid var(--white)!important;box-shadow:0 16px 48px rgba(29,78,216,.2),0 4px 12px rgba(0,0,0,.1)!important;position:relative;z-index:1}
.badge{z-index:2}

/* Gradient primary buttons */
.btn-p{background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 50%,#2563eb 100%);box-shadow:0 2px 14px rgba(29,78,216,.4)}
.btn-p:hover{background:linear-gradient(135deg,#1e3a8a 0%,#1e40af 60%,#1d4ed8 100%);box-shadow:0 6px 28px rgba(29,78,216,.55);transform:translateY(-2px)}
.nav-btn{background:linear-gradient(135deg,#1d4ed8 0%,#2563eb 100%);box-shadow:0 1px 8px rgba(29,78,216,.35)}
.nav-btn:hover{background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 100%);box-shadow:0 4px 18px rgba(29,78,216,.45);transform:translateY(-1px)}
.f-btn{background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 50%,#2563eb 100%)!important;box-shadow:0 2px 14px rgba(29,78,216,.4)!important}
.f-btn:hover{background:linear-gradient(135deg,#1e3a8a 0%,#1e40af 60%,#1d4ed8 100%)!important;box-shadow:0 6px 28px rgba(29,78,216,.55)!important;transform:translateY(-2px)!important}
.roi-cta{background:linear-gradient(135deg,#1d4ed8 0%,#2563eb 100%);box-shadow:0 2px 12px rgba(29,78,216,.45)}
.roi-cta:hover{background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 100%);box-shadow:0 6px 24px rgba(29,78,216,.55);transform:translateY(-2px)}

/* Eyebrow pill */
.eyebrow{background:linear-gradient(135deg,var(--blue-bg) 0%,rgba(59,130,246,.06) 100%);border:1px solid var(--blue-bd);padding:5px 14px;border-radius:20px;display:inline-flex;width:fit-content;letter-spacing:.08em;font-weight:600}
.eyebrow::before{display:none}

/* Gradient rule separator */
hr.rule{background:linear-gradient(90deg,transparent 0%,var(--stone-3) 25%,var(--stone-3) 75%,transparent 100%)}

/* Stats gradient text */
.stat-n{background:linear-gradient(135deg,var(--blue) 0%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:34px}

/* Hero card improvements */
.hero-card{background:linear-gradient(160deg,var(--white) 0%,var(--stone) 100%);box-shadow:0 16px 56px rgba(18,17,15,.12),0 4px 16px rgba(18,17,15,.07)}

/* Service card colored top accent */
.svc{border-top:2px solid var(--stone-3)}
.svc:nth-child(1){border-top:2px solid #3b82f6}
.svc:nth-child(2){border-top:2px solid #8b5cf6}
.svc:nth-child(3){border-top:2px solid #10b981}
.svc-icon{background:linear-gradient(135deg,var(--blue-bg) 0%,rgba(59,130,246,.08) 100%);box-shadow:0 2px 8px rgba(29,78,216,.1)}
.svc:hover{box-shadow:0 24px 56px rgba(0,0,0,.14),0 4px 16px rgba(0,0,0,.06);transform:translateY(-6px)}

/* Case study numbers gradient */
.cc-n{background:linear-gradient(135deg,#1d4ed8 0%,#7c3aed 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cc:hover{box-shadow:0 20px 48px rgba(29,78,216,.1),0 4px 12px rgba(0,0,0,.06);border-color:var(--blue);transform:translateY(-4px)}

/* ROI result enhancements */
.roi-res{background:linear-gradient(135deg,#080d18 0%,#0d1628 40%,#1a2540 100%);box-shadow:0 24px 64px rgba(0,0,0,.35)}
.roi-res-n{background:linear-gradient(135deg,#60a5fa 0%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Process badge gradient */
.proc-num-badge{background:linear-gradient(135deg,#1d4ed8 0%,#2563eb 100%);box-shadow:0 3px 12px rgba(29,78,216,.35)}
.proc-item-acc.open .proc-num-badge{background:linear-gradient(135deg,#1e40af 0%,#7c3aed 100%);box-shadow:0 4px 16px rgba(124,58,237,.4)}

/* Section hero with gradient */
#hero{background:linear-gradient(160deg,var(--white) 45%,#f0f5ff 75%,var(--stone) 100%)}
#hero::after{background:radial-gradient(circle,rgba(59,130,246,.1) 0%,transparent 65%)}

/* Services section */
#services{background:linear-gradient(180deg,var(--stone) 0%,#f4f3f0 100%)}

/* Cases section */
#cases{background:linear-gradient(180deg,var(--stone) 0%,#f0f4f8 100%)}

/* Chat header gradient */
.chat-hd{background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 60%,#8b5cf6 100%)}

/* Pain item improvements */
.pain-item{box-shadow:0 2px 8px rgba(0,0,0,.04)}
.pain-item.open{box-shadow:0 8px 32px rgba(29,78,216,.12),0 2px 8px rgba(29,78,216,.06)}

/* Playground live badge */
.pg-badge-live{background:linear-gradient(135deg,#059669 0%,#10b981 100%);box-shadow:0 2px 10px rgba(16,185,129,.25)}

/* Contact card highlighted */
.fc-card{transition:box-shadow .3s ease}
.fc-card:hover{box-shadow:0 20px 60px rgba(29,78,216,.1),0 4px 14px rgba(0,0,0,.06)}

/* Footer enhancements */
footer{background:linear-gradient(180deg,#0c0c0c 0%,#060606 100%);border-top:1px solid rgba(29,78,216,.15)}
.ft-logo span{background:linear-gradient(135deg,#3b82f6 0%,#8b5cf6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ftl:hover{color:#fff;border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.06)}

/* Nav logo */
.nav-logo-n{color:var(--blue)}

/* Badge improved */
.badge{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.8);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.badge:hover{background:rgba(239,246,255,.95);border-color:var(--blue-bd);box-shadow:0 8px 24px rgba(29,78,216,.18)}

/* Hero sub text link */
.hero-badge{box-shadow:0 2px 10px rgba(29,78,216,.15)}

/* =====================================================
   SALES SYSTEM LAYER
   ===================================================== */

/* URGENCY BAR */
.urgency-bar{background:linear-gradient(90deg,#1e3a8a 0%,#1d4ed8 50%,#2563eb 100%);color:#fff;padding:0 28px;height:38px;display:flex;align-items:center;justify-content:center;font-size:13px;position:relative;z-index:200;flex-shrink:0}
.ub-inner{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.ub-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 1.5s ease infinite;flex-shrink:0;box-shadow:0 0 6px rgba(74,222,128,.6)}
.ub-link{color:#fde68a;font-weight:700;border-bottom:1px solid rgba(253,230,138,.4);transition:opacity .15s;white-space:nowrap}
.ub-link:hover{opacity:.8}
.ub-close{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.15);font-size:12px;cursor:pointer;transition:background .15s;border:none;color:#fff;flex-shrink:0}
.ub-close:hover{background:rgba(255,255,255,.3)}
nav{top:38px}
#hero{padding-top:calc(120px + 38px)}
body.no-bar nav{top:0}
body.no-bar #hero{padding-top:120px}

/* TRUST STRIP */
.trust-strip{background:var(--white);border-bottom:1px solid var(--stone-3);padding:14px 0}
.trust-items{display:flex;align-items:center;justify-content:center;gap:36px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-2)}
.trust-item strong{color:var(--ink);font-weight:700}
.ti-icon{font-size:15px}
.trust-sep{color:var(--stone-3);font-size:18px;font-weight:200}
@media(max-width:640px){.trust-sep{display:none}.trust-items{gap:16px}}

/* TRUST MICRO under hero CTA */
.trust-micro{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:14px}
.tm-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-3);font-family:var(--f-mono)}
.tm-check{color:var(--green);font-weight:700;font-size:13px}

/* HERO URGENCY PILL */
.hero-urgency-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.18);padding:5px 14px;border-radius:20px;font-size:12px;font-family:var(--f-mono);color:#dc2626;font-weight:600;margin-bottom:18px}
.hup-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pulse 1.5s ease infinite;flex-shrink:0}

/* TESTIMONIALS */
#testimonials{background:var(--stone)}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px}
@media(max-width:768px){.testi-grid{grid-template-columns:1fr}}
.testi-card{background:var(--white);border:1px solid var(--stone-3);border-radius:var(--r-lg);padding:26px;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden;transition:all .3s ease}
.testi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),#8b5cf6)}
.testi-card:hover{box-shadow:0 16px 40px rgba(29,78,216,.1);transform:translateY(-3px)}
.testi-stars{color:#f59e0b;font-size:13px;letter-spacing:3px}
.testi-quote{font-size:14px;color:var(--ink-2);line-height:1.75;font-style:italic;flex:1;position:relative;padding-left:14px}
.testi-quote::before{content:'"';position:absolute;left:0;top:-2px;font-family:var(--f-display);font-size:36px;color:var(--blue-bd);line-height:1}
.testi-author{display:flex;align-items:center;gap:10px;padding-top:14px;border-top:1px solid var(--stone-3)}
.testi-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue) 0%,#8b5cf6 100%);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;font-family:var(--f-mono)}
.testi-info{display:flex;flex-direction:column;gap:1px}
.testi-name{font-size:13px;font-weight:700;color:var(--ink)}
.testi-role{font-size:11px;color:var(--ink-3);font-family:var(--f-mono)}
.testi-result{display:inline-flex;align-items:center;gap:4px;font-family:var(--f-mono);font-size:10px;font-weight:700;color:var(--green);background:rgba(5,150,105,.06);border:1px solid rgba(5,150,105,.18);padding:2px 8px;border-radius:20px;margin-top:2px;align-self:flex-start}

/* FAQ */
#faq{background:var(--white)}
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:44px;border:1px solid var(--stone-3);border-radius:var(--r-xl);overflow:hidden}
@media(max-width:768px){.faq-grid{grid-template-columns:1fr}}
.faq-item{padding:24px 28px;border-bottom:1px solid var(--stone-3);transition:background .2s ease;position:relative}
.faq-item:nth-child(odd){border-right:1px solid var(--stone-3)}
.faq-item:nth-last-child(-n+2){border-bottom:none}
@media(max-width:768px){.faq-item:nth-child(odd){border-right:none}.faq-item:nth-last-child(2){border-bottom:1px solid var(--stone-3)}.faq-item:last-child{border-bottom:none}}
.faq-item:hover{background:var(--stone)}
.faq-q{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:8px;display:flex;align-items:flex-start;gap:9px}
.faq-q-tag{font-family:var(--f-mono);font-size:9px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--blue),#7c3aed);padding:3px 6px;border-radius:4px;flex-shrink:0;margin-top:1px;letter-spacing:.04em}
.faq-a{font-size:13px;color:var(--ink-2);line-height:1.7;padding-left:28px}
.faq-a strong{color:var(--ink)}

/* SCARCITY BOX */
.scarcity-box{display:flex;align-items:flex-start;gap:10px;background:linear-gradient(135deg,rgba(5,150,105,.05) 0%,rgba(16,185,129,.03) 100%);border:1px solid rgba(5,150,105,.2);border-radius:var(--r-md);padding:12px 16px;margin-bottom:18px}
.sc-dot{width:10px;height:10px;border-radius:50%;background:#10b981;flex-shrink:0;margin-top:2px;animation:pulse 2s ease infinite;box-shadow:0 0 8px rgba(16,185,129,.5)}
.sc-text{font-size:13px;color:var(--ink-2);line-height:1.6}
.sc-text strong{color:var(--ink)}
.sc-meter{margin-top:8px;height:5px;background:var(--stone-3);border-radius:3px;overflow:hidden}
.sc-fill{height:100%;width:66%;background:linear-gradient(90deg,#10b981,#34d399);border-radius:3px;animation:meterGrow 1.5s ease-out .5s both}
@keyframes meterGrow{from{width:0}to{width:66%}}

/* GUARANTEE BADGE */
.guarantee-badge{display:flex;align-items:flex-start;gap:12px;background:linear-gradient(135deg,rgba(29,78,216,.04) 0%,rgba(124,58,237,.03) 100%);border:1px solid var(--blue-bd);border-radius:var(--r-md);padding:14px 16px;margin-top:16px}
.gb-icon{font-size:22px;line-height:1;flex-shrink:0}
.gb-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px}
.gb-text{font-size:12px;color:var(--ink-3);line-height:1.6}

/* CONTACT IMPROVED */
.contact-trust-row{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-top:20px;padding-top:18px;border-top:1px solid var(--stone-3)}
.ctr-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-3);font-family:var(--f-mono)}
.ctr-item::before{content:'✓';color:var(--green);font-weight:800;font-size:13px}

/* SOCIAL PROOF ROW in hero */
.hero-social-proof{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.hsp-stars{color:#f59e0b;font-size:13px}
.hsp-text{font-size:12px;color:var(--ink-3);font-family:var(--f-mono)}
.hsp-sep{color:var(--stone-3)}
.hsp-badge{font-size:12px;font-family:var(--f-mono);color:var(--blue-2);font-weight:600}

/* =====================================================
   WOW LAYER — Premium portfolio polish
   ===================================================== */

/* Scroll progress bar */
.scroll-progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#3b82f6,#8b5cf6,#ec4899);z-index:999;width:0;box-shadow:0 0 12px rgba(99,102,241,.6);transition:width .12s linear;pointer-events:none}

/* Custom spotlight cursor (desktop only) */
.cursor-spot{position:fixed;top:0;left:0;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.10) 0%,rgba(139,92,246,.05) 35%,transparent 70%);pointer-events:none;transform:translate(-50%,-50%);z-index:1;mix-blend-mode:plus-lighter;will-change:transform;filter:blur(20px);transition:opacity .4s ease;opacity:0}
[data-theme="dark"] .cursor-spot{background:radial-gradient(circle,rgba(129,140,248,.18) 0%,rgba(168,85,247,.10) 35%,transparent 70%)}
body:hover .cursor-spot{opacity:1}
@media (max-width:900px), (hover:none){.cursor-spot{display:none}}

/* Subtle film grain */
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");mix-blend-mode:overlay}
[data-theme="dark"] .grain{opacity:.04}

/* Hero aurora */
#hero{isolation:isolate}
.aurora{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.aurora b{position:absolute;width:60vw;height:60vw;border-radius:50%;filter:blur(90px);opacity:.4;animation:aur 22s ease-in-out infinite}
.aurora b:nth-child(1){top:-22%;left:-12%;background:radial-gradient(circle,#3b82f6 0%,transparent 70%)}
.aurora b:nth-child(2){top:18%;right:-22%;background:radial-gradient(circle,#a855f7 0%,transparent 70%);animation-delay:-7s;opacity:.32}
.aurora b:nth-child(3){bottom:-30%;left:30%;width:50vw;height:50vw;background:radial-gradient(circle,#06b6d4 0%,transparent 70%);animation-delay:-13s;opacity:.22}
[data-theme="dark"] .aurora b:nth-child(1){opacity:.32}
[data-theme="dark"] .aurora b:nth-child(2){opacity:.28}
[data-theme="dark"] .aurora b:nth-child(3){opacity:.22}
@keyframes aur{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.12)}66%{transform:translate(-25px,25px) scale(.95)}}

#hero .w{position:relative;z-index:2}

/* Kinetic shimmer name */
h1.hero-name{position:relative}
h1.hero-name .word{display:inline-block;background:linear-gradient(120deg,var(--ink) 0%,var(--ink) 40%,#3b82f6 50%,var(--ink) 60%,var(--ink) 100%);background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:shimmer 7s ease-in-out infinite}
h1.hero-name .word:nth-child(2){animation-delay:.5s}
[data-theme="dark"] h1.hero-name .word{background:linear-gradient(120deg,var(--ink) 0%,var(--ink) 40%,#a78bfa 50%,var(--ink) 60%,var(--ink) 100%);background-size:300% 100%;-webkit-background-clip:text;background-clip:text}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* Magnetic + tilt utilities */
.magnet{display:inline-block;will-change:transform;transition:transform .35s cubic-bezier(.2,.7,.2,1)}
.tilt{transform-style:preserve-3d;transition:transform .18s ease-out;will-change:transform}
.tilt > *{transform:translateZ(20px)}

/* Reveal upgrade — soft blur in */
.rv.rv-hidden{opacity:0;transform:translateY(22px);filter:blur(8px);transition:opacity .9s ease,transform .9s ease,filter 1s ease}
.rv.in{opacity:1;transform:none;filter:none}

/* PROJECTS / BENTO */
#projects{background:var(--white);position:relative;overflow:hidden}
[data-theme="dark"] #projects{background:#0a0a0a}
.bento-grid{display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:170px;gap:14px;margin-top:48px}
@media(max-width:1000px){.bento-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:auto}}
@media(max-width:560px){.bento-grid{grid-template-columns:1fr}}

.bento{position:relative;border:1px solid var(--stone-3);border-radius:22px;background:var(--white);padding:24px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;text-decoration:none;color:inherit;transition:transform .4s cubic-bezier(.2,.7,.2,1),box-shadow .4s,border-color .3s;cursor:pointer;will-change:transform;min-height:200px}
[data-theme="dark"] .bento{background:#111111;border-color:#1f1f1f}
.bento::before{content:'';position:absolute;inset:0;background:radial-gradient(700px circle at var(--mx,50%) var(--my,50%),rgba(99,102,241,.10),transparent 40%);opacity:0;transition:opacity .35s;pointer-events:none}
.bento:hover::before{opacity:1}
.bento:hover{transform:translateY(-4px);border-color:var(--blue);box-shadow:0 24px 60px rgba(29,78,216,.14)}
[data-theme="dark"] .bento:hover{border-color:#6366f1;box-shadow:0 28px 70px rgba(99,102,241,.30)}

.bento-tag{font-family:var(--f-mono);font-size:11px;color:var(--blue);background:var(--blue-bg);border:1px solid var(--blue-bd);padding:3px 10px;border-radius:20px;align-self:flex-start;letter-spacing:.04em;font-weight:600}
.bento-title{font-family:var(--f-display);font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.15;margin:14px 0 8px;color:var(--ink)}
.bento-desc{font-size:13px;color:var(--ink-3);line-height:1.6;margin-bottom:10px}
.bento-stack{display:flex;gap:6px;flex-wrap:wrap;font-family:var(--f-mono);font-size:11px;margin-top:auto}
.bento-stack span{background:var(--stone);border:1px solid var(--stone-3);color:var(--ink-3);padding:3px 9px;border-radius:20px}
[data-theme="dark"] .bento-stack span{background:#181818;border-color:#262626;color:var(--ink-2)}
.bento-icon{font-size:28px;margin-bottom:6px;display:inline-block}
.bento-arrow{position:absolute;top:22px;right:22px;width:36px;height:36px;border-radius:50%;background:var(--stone);border:1px solid var(--stone-3);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .3s;color:var(--ink-2)}
.bento:hover .bento-arrow{background:var(--blue);color:#fff;border-color:var(--blue);transform:rotate(-45deg)}

/* Featured hero project */
.bento-hero{grid-column:span 4;grid-row:span 2;background:linear-gradient(140deg,#0a0a14 0%,#11163a 50%,#1a1145 100%);color:#fff;border-color:transparent;justify-content:flex-end;padding:32px;min-height:auto}
[data-theme="dark"] .bento-hero{background:linear-gradient(140deg,#06060f 0%,#0e1130 50%,#150e3a 100%)}
.bento-hero .bento-title{color:#fff;font-size:32px;letter-spacing:-.025em}
.bento-hero .bento-desc{color:rgba(255,255,255,.72);font-size:14px;max-width:90%}
.bento-hero .bento-tag{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.3);color:#c4b5fd}
.bento-hero .bento-stack span{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.85)}
.bento-hero .bento-arrow{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}
.bento-hero:hover .bento-arrow{background:#fff;color:#0a0a14;border-color:#fff}
.bento-hero::after{content:'';position:absolute;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.45) 0%,transparent 70%);top:-120px;right:-100px;filter:blur(30px);animation:pulseGlow 7s ease-in-out infinite;pointer-events:none}
@keyframes pulseGlow{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}

/* Mock chat preview inside hero bento */
.bento-mock{position:absolute;top:30px;right:30px;width:240px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);padding:14px;backdrop-filter:blur(10px);transform:rotate(-2deg);transition:transform .6s cubic-bezier(.2,.7,.2,1);z-index:1}
.bento-hero:hover .bento-mock{transform:rotate(0deg) translateY(-6px) scale(1.02)}
.mck-row{display:flex;gap:8px;margin-bottom:9px;align-items:center}
.mck-row.user{flex-direction:row-reverse}
.mck-av{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a855f7);flex-shrink:0}
.mck-row.user .mck-av{background:rgba(255,255,255,.2)}
.mck-bubble{height:8px;border-radius:6px;background:rgba(255,255,255,.18);flex:1;max-width:80%}
.mck-bubble.s{max-width:55%}
.mck-row.user .mck-bubble{background:linear-gradient(90deg,rgba(99,102,241,.7),rgba(168,85,247,.7))}
@media(max-width:1100px){.bento-mock{display:none}}

/* Bento variants */
.bento-2{grid-column:span 2;grid-row:span 2;background:linear-gradient(155deg,#fff 0%,#eef2ff 100%)}
[data-theme="dark"] .bento-2{background:linear-gradient(155deg,#0f0f0f 0%,#161a35 100%);border-color:#1f1f1f}
.bento-3{grid-column:span 3;grid-row:span 1}
.bento-4{grid-column:span 3;grid-row:span 1}
.bento-5{grid-column:span 2;grid-row:span 1}
.bento-6{grid-column:span 2;grid-row:span 1}
.bento-7{grid-column:span 2;grid-row:span 1}
@media(max-width:1000px){
  .bento-hero{grid-column:span 2;grid-row:span 2}
  .bento-2{grid-column:span 2;grid-row:span 1}
  .bento-3,.bento-4,.bento-5,.bento-6,.bento-7{grid-column:span 1;grid-row:span 1}
}
@media(max-width:560px){
  .bento-hero,.bento-2,.bento-3,.bento-4,.bento-5,.bento-6,.bento-7{grid-column:span 1;grid-row:auto}
}

/* Mini visual decorators inside bento variants */
.bento-2::after{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.25),transparent 70%);bottom:-60px;left:-50px;filter:blur(8px);pointer-events:none}
.bento-mini-viz{position:absolute;top:20px;right:20px;display:flex;gap:4px;align-items:flex-end;height:50px}
.bento-mini-viz i{width:7px;background:linear-gradient(to top,#3b82f6,#a855f7);border-radius:3px;opacity:.85;animation:bar 1.6s ease-in-out infinite}
.bento-mini-viz i:nth-child(1){height:30%;animation-delay:0s}
.bento-mini-viz i:nth-child(2){height:60%;animation-delay:.2s}
.bento-mini-viz i:nth-child(3){height:90%;animation-delay:.4s}
.bento-mini-viz i:nth-child(4){height:50%;animation-delay:.6s}
.bento-mini-viz i:nth-child(5){height:75%;animation-delay:.8s}
@keyframes bar{0%,100%{transform:scaleY(.7)}50%{transform:scaleY(1)}}

/* SKILLS */
#skills{background:var(--stone);position:relative;overflow:hidden}
[data-theme="dark"] #skills{background:#0c0c0c}
.skill-cats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:32px 0 0}
.sc-tab{padding:9px 18px;border-radius:30px;border:1px solid var(--stone-3);background:transparent;color:var(--ink-2);font-size:13px;font-weight:500;cursor:pointer;transition:all .25s;font-family:var(--f-body)}
.sc-tab:hover{color:var(--blue);border-color:var(--blue-bd)}
.sc-tab.active{background:var(--ink);color:var(--white);border-color:var(--ink)}
[data-theme="dark"] .sc-tab.active{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;border-color:transparent}
.skills-pool{margin-top:30px;min-height:200px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.skill-chip{display:inline-flex;align-items:center;gap:10px;padding:11px 16px;background:var(--white);border:1px solid var(--stone-3);border-radius:14px;font-size:14px;font-weight:500;transition:all .35s cubic-bezier(.2,.7,.2,1);cursor:default;position:relative;overflow:hidden;color:var(--ink)}
[data-theme="dark"] .skill-chip{background:#141414;border-color:#262626}
.skill-chip::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--blue-bg) 0%,transparent 60%);opacity:0;transition:opacity .3s}
.skill-chip:hover::before{opacity:1}
.skill-chip:hover{transform:translateY(-3px) scale(1.03);border-color:var(--blue);box-shadow:0 12px 28px rgba(29,78,216,.15)}
[data-theme="dark"] .skill-chip:hover{border-color:#6366f1;box-shadow:0 12px 28px rgba(99,102,241,.25)}

<script>
/* 0b. URGENCY BAR */
function closeBar() {
  const bar = document.getElementById('urgencyBar');
  if (!bar) return;
  bar.style.transition = 'height .3s ease, opacity .3s ease';
  bar.style.opacity = '0';
  bar.style.height = '0';
  bar.style.overflow = 'hidden';
  document.body.classList.add('no-bar');
  setTimeout(() => bar.remove(), 350);
  sessionStorage.setItem('barClosed', '1');
}
// Check if bar was already closed
if (sessionStorage.getItem('barClosed') === '1') {
  const bar = document.getElementById('urgencyBar');
  if (bar) { bar.remove(); document.body.classList.add('no-bar'); }
}

/* 0. TEMA OSCURO/CLARO */
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
// Init theme
const savedTheme = localStorage.getItem('theme');
if (savedTheme) {
  document.documentElement.setAttribute('data-theme', savedTheme);
} else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.setAttribute('data-theme', 'dark');
}

/* 1. SCROLL REVEAL */
document.querySelectorAll('.rv').forEach(el => el.classList.add('rv-hidden'));
const ro = new IntersectionObserver(es => es.forEach(e => {
  if(e.isIntersecting){
    e.target.classList.remove('rv-hidden');
    e.target.classList.add('in');
    ro.unobserve(e.target);
  }
}), {threshold:.08, rootMargin:'0px 0px -20px 0px'});
document.querySelectorAll('.rv').forEach(el => ro.observe(el));

/* 2. CALCULADORA ROI (Forzada a iniciar) */
function calcROI(){
  try {
    const el = id => document.getElementById(id);
    if(!el('sH') || !el('sR') || !el('sT') || !el('sA')) return;
    
    const h = parseFloat(el('sH').value);
    const r = parseFloat(el('sR').value);
    const t = parseInt(el('sT').value);
    const a = parseFloat(el('sA').value) / 100;
    
    el('vH').textContent = h + 'h';
    el('vR').textContent = r + '€/h';
    el('vT').textContent = t;
    el('vA').textContent = Math.round(a * 100) + '%';
    
    const manual = h * r * t * 220;
    const savings = manual * a;
    const pilot = Math.min(Math.max(t * 600, 2500), 12000);
    const net = savings - pilot;
    
    el('bM').textContent = '€' + Math.round(manual).toLocaleString('es-ES');
    el('bI').textContent = '–€' + Math.round(pilot).toLocaleString('es-ES');
    el('bN').textContent = '€' + Math.round(Math.max(net, 0)).toLocaleString('es-ES');
    el('roiN').textContent = '€' + Math.round(Math.max(net, 0)).toLocaleString('es-ES');
  } catch (err) {
    console.error('Error calcROI', err);
  }
}

// Ejecución inmediata
calcROI();
document.querySelectorAll('#roi input[type=range]').forEach(i => i.addEventListener('input', calcROI));

/* 4. CHAT IA REAL CONECTADO */
let busy = false;

function rt(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}

function addM(role,text){

function showTy(){
  const c = document.getElementById('cMsgs');

function rmTy(){const e=document.getElementById('tyEl');if(e)e.remove();}

async function stream(text){
  const c = document.getElementById('cMsgs');
  const d = document.createElement('div'); d.className = 'msg b';
  const av = document.createElement('div'); av.className = 'm-av bot'; av.innerHTML = '<img src="letra-n.png" alt="" width="20px">';
  const b = document.createElement('div'); b.className = 'bbl'; b.innerHTML = '';
  d.appendChild(av); d.appendChild(b); c.appendChild(d); c.scrollTop = c.scrollHeight;
  let acc = '';
  for(const w of text.split(' ')){
    acc += (acc ? ' ' : '') + w;
    b.innerHTML = rt(acc);
    c.scrollTop = c.scrollHeight;
    await new Promise(r => setTimeout(r, 20));
  }
}

// ESTA FUNCIÓN ES EL BOTÓN DE ENVÍO
async function cSend() {
  const input = document.getElementById('cIn');
  const text = input.value;
  if (!text.trim() || busy) return;
  
  busy = true;
  document.getElementById('cOpts').style.display = 'none';
  document.getElementById('cBtn').disabled = true;
  document.getElementById('cSt').textContent = 'Escribiendo... ✨';
  input.value = '';
  
  addM('u', text);
  showTy();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    
    const data = await response.json();
    rmTy();
    if (data.text) {
      await stream(data.text);
    } else {
      await stream("He recibido una respuesta vacía. Revisa tu saldo en OpenAI.");
    }
  } catch (error) {
    rmTy();
    await stream("Error de conexión con el servidor. ¿Has subido la carpeta /api a Vercel?");
    console.error("Error:", error);
  }
  
  busy = false;
  document.getElementById('cBtn').disabled = false;
  document.getElementById('cSt').textContent = 'En línea ahora ✨';
}

// Función para los botones de sugerencia rápidos
function cs(text) {
  document.getElementById('cIn').value = text;
  cSend();
}

// Animación de estadísticas del hero
function animateStats() {
  const stats = document.querySelectorAll('.stat-n');
  stats.forEach((stat, index) => {
    const target = parseInt(stat.textContent.replace(/[^\d]/g, ''));
    if (target) {
      let current = 0;
      const increment = target / 60; // 60 frames para 1 segundo
      const timer = setInterval(() => {
        current += increment;
        if (current >= target) {
          stat.textContent = stat.textContent.replace(/\d+/, target);
          clearInterval(timer);
        } else {
          stat.textContent = stat.textContent.replace(/\d+/, Math.floor(current));
        }
      }, 16);
    }
  });
}

// Animación de casos escalonada
function animateCases() {
  const cases = document.querySelectorAll('.cc');
  cases.forEach((caseEl, index) => {
    caseEl.style.animationDelay = `${index * 0.2}s`;
    caseEl.classList.add('case-animate');
  });
}

// Sistema de crecimiento dinámico
function dynamicGrowth() {
  const growthElements = document.querySelectorAll('.growth-dynamic');
  growthElements.forEach(el => {
    const baseValue = parseInt(el.dataset.base || el.textContent);
    const growth = Math.sin(Date.now() / 10000) * 0.1; // Oscilación suave
    const newValue = Math.round(baseValue * (1 + growth));
    el.textContent = el.textContent.replace(/\d+/, newValue);
  });
}

// Intersection Observer para animaciones al hacer scroll
function initScrollAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('animate-in');
      }
    });
  }, { threshold: 0.1 });

  // Observar elementos que queremos animar
  document.querySelectorAll('.cc, .svc, .pi').forEach(el => {
    observer.observe(el);
  });
}

// Inicializar todo cuando se carga la página
document.addEventListener('DOMContentLoaded', () => {
  // Animar estadísticas después de un pequeño delay
  setTimeout(animateStats, 500);
  
  // Animar casos
  animateCases();
  
  // Inicializar animaciones de scroll
  initScrollAnimations();
  
  // Sistema de crecimiento dinámico cada 5 segundos
  setInterval(dynamicGrowth, 5000);

  // Acordeón de dolor
  document.querySelectorAll('.pain-header').forEach(header => {
    header.addEventListener('click', function() {
      const item = this.closest('.pain-item');
      item.classList.toggle('open');
    });
  });

  // Acordeón de proceso
  document.querySelectorAll('.proc-header').forEach(header => {
    header.addEventListener('click', function() {
      const item = this.closest('.proc-item-acc');
      const isOpen = item.classList.contains('open');

      // Cerrar todos
      document.querySelectorAll('.proc-item-acc').forEach(el => el.classList.remove('open'));

      // Abrir solo si no estaba abierto
      if (!isOpen) {
        item.classList.add('open');
      }
    });
  });

  /* ========== WOW INTERACTIONS ========== */

  // Scroll progress bar
  const sp = document.getElementById('scrollProgress');
  if (sp) {
    const onScroll = () => {
      const h = document.documentElement;
      const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
      sp.style.width = Math.min(100, Math.max(0, pct)) + '%';
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }

  // Spotlight cursor (desktop)
  const spot = document.getElementById('cursorSpot');
  if (spot && window.matchMedia('(hover:hover)').matches) {
    let tx = window.innerWidth / 2, ty = window.innerHeight / 2;
    let cx = tx, cy = ty;
    document.addEventListener('mousemove', (e) => { tx = e.clientX; ty = e.clientY; }, { passive: true });
    const tick = () => {
      cx += (tx - cx) * 0.18;
      cy += (ty - cy) * 0.18;
      spot.style.transform = `translate(${cx}px, ${cy}px) translate(-50%,-50%)`;
      requestAnimationFrame(tick);
    };
    tick();
  }

  // Bento spotlight: track per-card mouse position for ::before highlight
  document.querySelectorAll('.bento').forEach(card => {
    card.addEventListener('mousemove', (e) => {
      const r = card.getBoundingClientRect();
      card.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
      card.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
    });
  });

  // 3D tilt on .tilt cards
  if (window.matchMedia('(hover:hover)').matches) {
    document.querySelectorAll('.tilt').forEach(el => {
      el.addEventListener('mousemove', (e) => {
        const r = el.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width - 0.5;
        const y = (e.clientY - r.top) / r.height - 0.5;
        el.style.transform = `perspective(900px) rotateX(${(-y * 6).toFixed(2)}deg) rotateY(${(x * 7).toFixed(2)}deg) translateY(-4px)`;
      });
      el.addEventListener('mouseleave', () => { el.style.transform = ''; });
    });
  }

  // Magnetic buttons
  if (window.matchMedia('(hover:hover)').matches) {
    document.querySelectorAll('.magnet').forEach(el => {
      el.addEventListener('mousemove', (e) => {
        const r = el.getBoundingClientRect();
        const x = e.clientX - (r.left + r.width / 2);
        const y = e.clientY - (r.top + r.height / 2);
        el.style.transform = `translate(${x * 0.18}px, ${y * 0.25}px)`;
      });
      el.addEventListener('mouseleave', () => { el.style.transform = ''; });
    });
  }

  // Skills category filter
  const tabs = document.querySelectorAll('.sc-tab');
  const chips = document.querySelectorAll('#skillsPool .skill-chip');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const cat = tab.dataset.cat;
      chips.forEach(c => {
        const match = cat === 'all' || c.dataset.cat === cat;
        c.classList.toggle('show', match);
      });
    });
  });

  // Smooth scroll for in-page anchors (already handled by scroll-behavior, but add offset for sticky nav)
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    const id = a.getAttribute('href');
    if (id.length < 2) return;
    a.addEventListener('click', (e) => {
      const t = document.querySelector(id);
      if (!t) return;
      e.preventDefault();
      const offset = (document.querySelector('nav')?.offsetHeight || 60) + 12;
      window.scrollTo({ top: t.getBoundingClientRect().top + window.scrollY - offset, behavior: 'smooth' });
    });
  });

  // Active nav link highlighting
  const navAnchors = document.querySelectorAll('.nav-links a');
  const navMap = {};
  navAnchors.forEach(a => { const id = a.getAttribute('href').slice(1); if (id) navMap[id] = a; });
  const sectIds = Object.keys(navMap);
  const navObs = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      const a = navMap[en.target.id];
      if (a && en.isIntersecting) {
        navAnchors.forEach(x => x.style.color = '');
        a.style.color = 'var(--blue)';
      }
    });
  }, { rootMargin: '-40% 0px -55% 0px' });
  sectIds.forEach(id => { const s = document.getElementById(id); if (s) navObs.observe(s); });
});

// Override animateStats to keep suffixes (h+, h, k, etc.)
window.animateStats = function() {
  document.querySelectorAll('.stat-n').forEach(stat => {
    const original = stat.textContent;
    const m = original.match(/^([^\d]*)(\d+)(.*)$/);
    if (!m) return;
    const prefix = m[1], target = parseInt(m[2], 10), suffix = m[3];
    let current = 0;
    const dur = 1200, start = performance.now();
    const step = (now) => {
      const t = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - t, 3);
      const v = Math.round(target * eased);
      stat.textContent = prefix + v + suffix;
      if (t < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  });
};
</script>
